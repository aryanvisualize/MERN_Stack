<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Images/logo.png">
    <title>Starbucks Coffee Company</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
.logo{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 40px;
    box-shadow: 0px 2px 12px rgba(0,0,0,0.08);
    background-color: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo-img{
    width: 50px;
    height: 50px;
}

nav{
    display: flex;
    align-items: center;
    gap: 30px;
    flex: 1;
    margin-left: 40px;
}

nav ul li a{
    font-size: 15px;
    font-weight: 600;
    color: #333;
    text-decoration: none;
    transition: color 0.3s ease;
}

nav ul{
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 30px;
    align-items: center;
}

nav ul li{
    display: inline-block;
}

nav ul li a:hover{
    color: #00704a;
}

.search-box{
    background-color: #f7f7f7;
    padding: 10px 18px;
    border-radius: 25px;
    border: 1px solid #e8e8e8;
    transition: all 0.3s ease;
}

.search-box:hover{
    border-color: #00704a;
    box-shadow: 0px 2px 8px rgba(0,112,74,0.1);
}

.search-box input{
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    color: #333;
}

.search-box input::placeholder{
    color: #999;
}

.welcome{
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 70px;
    background-color: #1c402d;
}

.welcome button{
    color: white;
    border-radius: 30px;
    border: 1px solid white;
    background: transparent;
}
.curations{
    padding: 50px;
}

.curations h1{
    color: rgb(17, 59, 17);
    margin-bottom: 30px;
}

.items{
    display: flex;
    justify-content: space-around;
    text-align: center;
}

.items img{
    width: 120px;
    height: 120px;
    border-radius: 50%;
}

.items p{
    font-size: 20px;
    font-weight: bold;
}

.recommend{
    background-color: #edebe9;
    padding: 50px;
}

.card{
    width: 350px;
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width: 100px;
    border-radius: 10px;
}

.card button{
    background-color: green;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 25px;
    cursor: pointer;
}

    </style>
</head>
<body>
    
    <header>
        <div class="logo">
            <div>
                <img class="logo-img" src="Images/logo.png" alt="logo">
            </div>
            <div>

            </div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Gift</a></li>
                    <li><a href="#">Order</a></li>
                    <li><a href="#">Pay</a></li>
                    <li><a href="#">Store</a></li>
                    <li><a href="#">Corporate Gifting</a></li>
                    <div class="search-box">
    <input type="text" placeholder="Looking for something specific?">
</div>
                </ul>
                <img src="Images/account_thin.svg" alt="">
            </nav>

        </div>
        <div>
            <div class="welcome">
                <p>Welcome Starbucks</p>
                <button>Know more</button>
                
            </div>
        </div>
    </header>

<div class="curations">

    <h1>Handcrafted Curations</h1>

    <div class="items">

        <div>
            <img src="Images/Bestseller.webp">
            <p>Bestseller</p>
        </div>

        <div>
            <img src="Images/Drinks.webp">
            <p>Drinks</p>
        </div>

        <div>
            <img src="Images/Food.webp">
            <p>Food</p>
        </div>

        <div>
            <img src="Images/Merchandise.webp">
            <p>Merchandise</p>
        </div>

        <div>
            <img src="Images/CoffeeAtHome.webp">
            <p>Coffee At Home</p>
        </div>

        <div>
            <img src="Images/ReadyToEat.webp">
            <p>Ready to Eat</p>
        </div>

    </div>

</div>
<div class="recommend">

    <h1>Barista Recommends</h1>

    <div class="card">

        <img src="Images/100501.webp" alt="Java Chip Frappuccino">

        <h2>Java Chip Frappuccino</h2>

        <p>Tall | 354 ml | 392 kcal</p>

        <h2>₹456.75</h2>

        <button>Add Item</button>

    </div>

</div>

</body>
</html>
