<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 900px;
            height: 700px;
            background-color: beige;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* grid-template-rows: repeat(); */
            gap: 10px;
            /* justify-content: center;
            align-content: center; */
        }
        .child{
            background-color: aqua;
            /* width: 100px;
            height: 100px; */
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .child-1{
            grid-column: 1/4;
        }
        .child-2{
            grid-row: 2/4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child child-1">navbar</div>
        <div class="child child-2">sidebar</div>
        <div class="child child-3">content-1</div>
        <div class="child child-4">content-2</div>
        <div class="child child-5">content-3</div>
        <div class="child child-6">footer</div>
    </div>
</body>
</html>
