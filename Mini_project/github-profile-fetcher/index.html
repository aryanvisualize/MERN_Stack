<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <style>
        :root {
            --bg: #eef2ff;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #cbd5e1;
            --text: #0f172a;
            --muted: #64748b;
            --surface: #f8fafc;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin: 0 0 20px;
            padding: 16px 0;
            font-size: 26px;
            text-align: center;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 26px;
            border-radius: 18px;
            background: var(--card);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        input,
        button {
            font-size: 15px;
            outline: none;
        }

        input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        button {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .profile {
            text-align: center;
        }

        .profile img {
            width: 120px;
            height: 120px;
            margin-bottom: 16px;
            border-radius: 999px;
            object-fit: cover;
            border: 4px solid var(--bg);
        }

        .profile h2 {
            margin: 0;
            font-size: 24px;
            color: var(--text);
        }

        .profile p {
            margin: 10px 0 0;
            color: #475569;
            line-height: 1.5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .stat {
            padding: 14px 10px;
            border-radius: 14px;
            background: var(--surface);
        }

        .stat strong {
            display: block;
            font-size: 18px;
            color: #111827;
        }

        .stat span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
        }

        .error {
            margin-top: 16px;
            text-align: center;
            color: var(--danger);
        }
    </style>
</head>
<body>
    
    <div class="container">
        <h1>GitHub User Finder</h1>
        <div class="search-box">
            <input type="text" id="userid" placeholder="Enter your GitHub UserName"/>
            <button id="btn">Find User</button>
        </div>
        <div id="result"></div>
    </div>
    <script>
        const btn = document.querySelector("#btn");
        const input = document.querySelector("#userid");
        const result = document.querySelector("#result");

        btn.addEventListener("click", () => {
            const username = input.value.trim();
            result.innerHTML = "";

            if (!username) {
                result.innerHTML = '<p class="error">Please enter a GitHub username.</p>';
                return;
            }

            fetch(`https://api.github.com/users/${username}`)
                .then((res) => res.json())
                .then((data) => {
                    if (data.message) {
                        result.innerHTML = `<p class="error">${data.message}</p>`;
                        return;
                    }

                    const profile = document.createElement("div");
                    profile.className = "profile";
                    profile.innerHTML = `
                        <img src="${data.avatar_url}" alt="${data.login} avatar" />
                        <h2>${data.name || data.login}</h2>
                        <p>${data.bio || "No bio available."}</p>
                        <div class="stats">
                            <div class="stat"><strong>${data.followers}</strong><span>Followers</span></div>
                            <div class="stat"><strong>${data.following}</strong><span>Following</span></div>
                            <div class="stat"><strong>${data.public_repos}</strong><span>Repos</span></div>
                        </div>
                    `;
                    result.appendChild(profile);
                })
                .catch((err) => {
                    result.innerHTML = '<p class="error">Unable to fetch profile.</p>';
                    console.log(err);
                });
        });
    </script>
</body>
</html>
