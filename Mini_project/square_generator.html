<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Generator</title>
    <style>
        body{
            background: radial-gradient(circle at top);
            background-color: rgb(254, 196, 252);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            margin: 0;
        }
        input,
        button{
            padding: 12px 16px;
            border: 1px solid; 
            border-radius: 999px;
            outline: none;
            font-size: 16px;
        }

        .controls{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input{
            width: 200px;
            margin-right: 10px;
        }

        input::placeholder{
            color: rgb(189, 60, 189);
        }
        button{
            cursor: pointer;
            background-color: rgb(150, 52, 150);
        }
    
        .square{
            width: 100px;
            height: 100px;
            background: orange;
            margin: 10px;
            display: inline-block;
        }
        .container{
            width: 1400px;
            min-height: 520px;
            background: beige;
            border: 1px solid ;
            padding: 20px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
        }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="inputvalue" placeholder="Enter the number"/>
        <button id="btn">Generate Boxes</button>
    </div>
    <div class="container">
    </div>
    <script>
        const btn = document.querySelector("#btn");
        //console.log(btn);
        btn.addEventListener("click",(e)=>{
            const shapeNum = document.querySelector("#inputvalue").value;
            //console.log(shapeNum);
            for(let i=0;i<shapeNum;i++){
                const ele = document.createElement("div");
                ele.classList.add("square");
                document.querySelector(".container").appendChild(ele);
            }
        })
    </script>
    
</body>
</html>
