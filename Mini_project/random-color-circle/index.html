<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Circle Generator</title>
    <style>
        .circle{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: aqua;
            position: absolute;
        }
        .container{
            width: 1650px;
            height: 700px;
            background-color: beige;
        }
    </style>
</head>
<body>
    <div class="container"></div>
    <script>
        const container = document.querySelector(".container");
        container.addEventListener("click",(e)=>{
            const color = ["blue","indigo","green","yellow","orange","violet","red"]; 
            const randomIndex = color[Math.floor(Math.random()*color.length)];
            console.log(randomIndex);
            const ele = document.createElement("div");
            ele.classList.add("circle");
            ele.style.backgroundColor = randomIndex;
            ele.style.top = e.clientY - 50 + "px";
            ele.style.left = e.clientX - 50 + "px";
            container.appendChild(ele);
        })
    </script>
</body>
</html>
